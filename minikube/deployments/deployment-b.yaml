apiVersion: apps/v1
kind: Deployment
metadata:
  name: bob-web-server
  namespace: tenant-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bob-web-server
  template:
    metadata:
      labels:
        app: bob-web-server
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80       